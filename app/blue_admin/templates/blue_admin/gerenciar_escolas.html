{% extends "admin_base.html" %}

{% block content %}
<div class="d-flex justify-content-between flex-wrap flex-md-nowrap align-items-center pt-3 pb-2 mb-3 border-bottom">
    <h1 class="h2">Gerenciar Escolas</h1>
    <div class="btn-toolbar mb-2 mb-md-0">
        <a href="{{ url_for('blue_admin.nova_escola') }}" class="btn btn-sm btn-primary">
            <i class="bi bi-plus-lg"></i> Nova Escola
        </a>
    </div>
</div>

<div class="table-responsive">
    <table class="table table-striped table-sm align-middle">
        <thead>
            <tr>
                <th>ID</th>
                <th>Nome da Instituição</th>
                <th>Cidade/Estado</th>
                <th class="text-end">Ações</th>
            </tr>
        </thead>
        <tbody>
            {% for e in escolas %}
            <tr>
                <td>{{ e.id }}</td>
                <td>{{ e.nome }}</td>
                <td>{{ e.cidade or '-' }} / {{ e.estado or '-' }}</td>
                <td class="text-end">
                    <a href="{{ url_for('blue_admin.editar_escola', id=e.id) }}"
                        class="btn btn-sm btn-outline-secondary">Editar</a>
                    <form action="{{ url_for('blue_admin.excluir_escola', id=e.id) }}" method="post" class="d-inline">
                        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                        <button type="submit" class="btn btn-sm btn-outline-danger"
                            onclick="return confirm('Deseja excluir esta escola? Todas as práticas ligadas a ela também serão excluídas.')">Excluir</button>
                    </form>
                </td>
            </tr>
            {% else %}
            <tr>
                <td colspan="4" class="text-center text-muted">Ainda não há escolas cadastradas.</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>
{% endblock %}
